version: '3.8'
services:
  mcp-server:
    build: ./backend
    command: python -m mcp_server.server
    ports:
      - "8001:8001"   # MCP server (SSE)
    env_file: ./backend/.env
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      # Reach the MCP server through the compose network, not localhost
      - MCP_CLIENT_HOST=mcp-server
    depends_on:
      - mcp-server
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://47.82.152.175:8000
    depends_on:
      - backend
    restart: unless-stopped
